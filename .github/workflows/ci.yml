name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # e2e テスト(kei_emit/tests/e2e.rs)が npm / npx を使う
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: cargo test --workspace

  workers-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Build @kei/runtime (dist/)
        working-directory: runtime
        run: npm ci --no-audit --no-fund && npm run build
      - name: Build @kei/hono (dist/)
        working-directory: tests/cli/packages/kei-hono
        run: npm ci --no-audit --no-fund && npm run build
      - name: Install workers-api deps
        working-directory: examples/workers-api
        run: npm ci
      - name: kei build (workers-api)
        working-directory: examples/workers-api
        run: cargo run -q -p kei_cli --bin kei -- build . --out-dir dist
      - name: vitest-pool-workers e2e
        working-directory: examples/workers-api
        run: npm test
